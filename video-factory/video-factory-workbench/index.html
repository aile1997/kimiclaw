<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI厂长视频工厂 - 工作台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cyber: {
              dark: '#0a0a0f',
              purple: '#b026ff',
              cyan: '#00d4ff',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      min-height: 100vh;
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .progress-bar {
      background: linear-gradient(90deg, #b026ff, #00d4ff);
    }
    .glow-purple {
      box-shadow: 0 0 20px rgba(176, 38, 255, 0.3);
    }
    .animate-pulse-slow {
      animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
</head>
<body class="text-white">
  <!-- Header -->
  <header class="sticky top-0 z-50 glass border-b border-purple-500/30">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-600 to-cyan-500 flex items-center justify-center glow-purple">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"></path>
            </svg>
          </div>
          <div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-purple-400 to-cyan-400 bg-clip-text text-transparent">AI厂长视频工厂</h1>
            <p class="text-xs text-gray-400 flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
              系统运行中 · 效率提升 10x
            </p>
          </div>
        </div>
        <button onclick="runAllAgents()" class="flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-purple-600 to-cyan-500 rounded-xl font-semibold hover:shadow-lg hover:shadow-purple-500/25 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
          一键运行
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
    <!-- 统计卡片 -->
    <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="p-4 rounded-2xl border bg-gradient-to-br from-purple-500/20 to-purple-600/20 border-purple-500/30">
        <div class="flex items-center justify-between">
          <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
          <span class="text-2xl font-bold">2</span>
        </div>
        <div class="text-sm text-gray-400 mt-1">总项目</div>
      </div>
      <div class="p-4 rounded-2xl border bg-gradient-to-br from-green-500/20 to-green-600/20 border-green-500/30">
        <div class="flex items-center justify-between">
          <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <span class="text-2xl font-bold">1</span>
        </div>
        <div class="text-sm text-gray-400 mt-1">已完成</div>
      </div>
      <div class="p-4 rounded-2xl border bg-gradient-to-br from-yellow-500/20 to-yellow-600/20 border-yellow-500/30">
        <div class="flex items-center justify-between">
          <svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <span class="text-2xl font-bold">1</span>
        </div>
        <div class="text-sm text-gray-400 mt-1">运行中</div>
      </div>
      <div class="p-4 rounded-2xl border bg-gradient-to-br from-cyan-500/20 to-cyan-600/20 border-cyan-500/30">
        <div class="flex items-center justify-between">
          <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
          <span class="text-2xl font-bold">5</span>
        </div>
        <div class="text-sm text-gray-400 mt-1">Agent数</div>
      </div>
    </section>

    <!-- Agent状态 -->
    <section>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Agent状态</h2>
        <span class="text-xs text-gray-500">点击卡片触发</span>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-5 gap-4" id="agent-cards"></div>
    </section>

    <!-- 项目列表 + 详情 -->
    <div class="grid lg:grid-cols-3 gap-6">
      <section class="lg:col-span-1">
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">项目列表</h2>
        <div class="space-y-3" id="project-list"></div>
      </section>

      <section class="lg:col-span-2 space-y-4">
        <div id="project-detail" class="glass rounded-2xl p-6"></div>
        <div class="glass rounded-2xl p-5">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
              <span class="text-sm font-semibold">控制台输出</span>
            </div>
            <span class="text-xs text-gray-500" id="log-count">0 条日志</span>
          </div>
          <div id="console-output" class="font-mono text-sm space-y-1.5 max-h-48 overflow-y-auto pr-2 text-cyan-300"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const projects = [
      { id: 'video2', date: '2026-02-27', topic: '《OpenClaw高阶进化指南》', status: 'images', progress: 85, script: { wordCount: 2200, duration: 600 }, images: { count: 13, completed: 13 }, voice: { duration: 600 } },
      { id: 'v3', date: '2026-02-26', topic: 'OpenClaw自动化实战', status: 'completed', progress: 100, script: { wordCount: 228, duration: 90 }, images: { count: 5, completed: 5 }, voice: { duration: 90 } }
    ];

    const agents = [
      { name: '脚本创作', status: 'completed', progress: 100, message: '✓ 口播稿已生成', lastRun: '12:11' },
      { name: '语音合成', status: 'completed', progress: 100, message: '✓ CosyVoice音频已生成', lastRun: '12:15' },
      { name: '配图生成', status: 'completed', progress: 100, message: '✓ 13张配图已生成', lastRun: '21:32' },
      { name: '时间轴', status: 'running', progress: 60, message: '⏳ 提取中...' },
      { name: '视频合成', status: 'idle', progress: 0, message: '等待执行' }
    ];

    let selectedProject = projects[0];
    let logs = [];

    const statusColors = {
      idle: 'from-gray-500/20 to-gray-600/20 border-gray-500/30',
      running: 'from-yellow-500/20 to-orange-500/20 border-yellow-500/50',
      completed: 'from-green-500/20 to-emerald-500/20 border-green-500/30',
      error: 'from-red-500/20 to-rose-500/20 border-red-500/30'
    };

    const statusLabels = { pending: '等待中', script: '脚本创作', voice: '语音合成', images: '配图生成', timeline: '时间轴', composing: '视频合成', completed: '已完成', error: '错误' };

    function renderAgents() {
      document.getElementById('agent-cards').innerHTML = agents.map(agent => `
        <div onclick="triggerAgent('${agent.name}')" class="group p-5 rounded-2xl border backdrop-blur-sm cursor-pointer transition-all hover:scale-105 hover:shadow-xl bg-gradient-to-br ${statusColors[agent.status]}">
          <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-medium ${agent.status === 'completed' ? 'text-green-400' : agent.status === 'running' ? 'text-yellow-400' : 'text-gray-400'}">${agent.progress}%</span>
          </div>
          <div class="text-sm font-semibold mb-1">${agent.name}</div>
          <div class="text-xs text-gray-400 truncate">${agent.message}</div>
          <div class="mt-3 w-full bg-gray-700/50 rounded-full h-1.5">
            <div class="h-full rounded-full ${agent.status === 'completed' ? 'bg-green-500' : agent.status === 'running' ? 'bg-gradient-to-r from-yellow-400 to-orange-500' : 'bg-gray-500'}" style="width: ${agent.progress}%"></div>
          </div>
        </div>
      `).join('');
    }

    function renderProjects() {
      document.getElementById('project-list').innerHTML = projects.map(project => `
        <div onclick="selectProject('${project.id}')" class="p-4 rounded-2xl border cursor-pointer transition-all ${selectedProject.id === project.id ? 'bg-purple-500/10 border-purple-500/50' : 'glass hover:bg-white/10'}">
          <div class="flex items-start justify-between mb-2">
            <div>
              <div class="font-medium text-sm">${project.topic}</div>
              <div class="text-xs text-gray-500 mt-0.5">${project.date}</div>
            </div>
            <svg class="w-4 h-4 transition-transform ${selectedProject.id === project.id ? 'rotate-90 text-purple-400' : 'text-gray-600'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </div>
          <div class="flex items-center justify-between mt-3">
            <span class="text-xs px-2 py-1 rounded-full ${project.status === 'completed' ? 'bg-green-500/20 text-green-400' : 'bg-purple-500/20 text-purple-400'}">${statusLabels[project.status]}</span>
            <span class="text-xs text-gray-500 font-medium">${project.progress}%</span>
          </div>
          <div class="mt-2 w-full bg-gray-700/30 rounded-full h-1.5">
            <div class="h-full rounded-full bg-gradient-to-r from-purple-500 to-cyan-500" style="width: ${project.progress}%"></div>
          </div>
        </div>
      `).join('');
    }

    function renderDetail() {
      document.getElementById('project-detail').innerHTML = `
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="text-xl font-bold">${selectedProject.topic}</h2>
            <p class="text-sm text-gray-400 mt-1">创建于 ${selectedProject.date}</p>
          </div>
          <div class="flex gap-2">
            <button class="p-2.5 bg-purple-500/20 border border-purple-500/50 rounded-xl hover:bg-purple-500/30 transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </button>
          </div>
        </div>
        <div class="space-y-5">
          <div class="border-l-2 border-blue-500/30 pl-4">
            <div class="flex items-center gap-2 mb-2">
              <span class="font-medium text-sm">📝 口播稿</span>
              <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div class="text-sm text-gray-300">${selectedProject.script.wordCount} 字 · ${selectedProject.script.duration} 秒</div>
          </div>
          <div class="border-l-2 border-purple-500/30 pl-4">
            <div class="flex items-center gap-2 mb-2">
              <span class="font-medium text-sm">🎨 PPT配图 (${selectedProject.images.completed}/${selectedProject.images.count}张)</span>
              <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div class="grid grid-cols-6 gap-2 mt-2">
              ${Array.from({length: Math.min(selectedProject.images.count, 12)}, (_, i) => `<div class="aspect-video bg-gradient-to-br from-purple-500/20 to-cyan-500/20 rounded-lg flex items-center justify-center text-xs font-medium border border-white/5">P${i+1}</div>`).join('')}
              ${selectedProject.images.count > 12 ? `<div class="aspect-video bg-white/10 rounded-lg flex items-center justify-center text-xs border border-white/5">+${selectedProject.images.count - 12}</div>` : ''}
            </div>
          </div>
          <div class="border-l-2 border-green-500/30 pl-4">
            <div class="flex items-center gap-2 mb-2">
              <span class="font-medium text-sm">🎤 语音合成</span>
              <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div class="text-sm text-gray-300">总时长: ${selectedProject.voice.duration} 秒</div>
          </div>
        </div>
      `;
    }

    function selectProject(id) {
      selectedProject = projects.find(p => p.id === id);
      renderProjects();
      renderDetail();
    }

    function triggerAgent(name) {
      log(`启动 ${name}...`);
      setTimeout(() => log(`${name} 执行完成`, 'success'), 1000);
    }

    function runAllAgents() {
      log('🚀 启动所有Agent...');
      agents.forEach((agent, i) => setTimeout(() => log(`${agent.name} 运行中...`), i * 500));
      setTimeout(() => log('✅ 所有Agent执行完成', 'success'), agents.length * 500 + 500);
    }

    function log(msg, type = 'info') {
      const time = new Date().toLocaleTimeString('zh-CN');
      logs.push({ time, msg, type });
      document.getElementById('console-output').innerHTML = logs.map(l => `<div class="${l.type === 'success' ? 'text-green-400' : l.type === 'error' ? 'text-red-400' : 'text-cyan-300'}"><span class="text-gray-500">[${l.time}]</span> ${l.msg}</div>`).join('');
      document.getElementById('log-count').textContent = logs.length + ' 条日志';
    }

    renderAgents();
    renderProjects();
    renderDetail();
    log('工作台已加载');
  </script>
</body>
</html>
